version: '3'

vars:
  GOLANGCI_LINT_VERSION: v2.12.2
  GOSEC_VERSION: v2.26.1
  GOVULNCHECK_VERSION: v1.3.0
  GORELEASER_VERSION: v2.17.0
  VERSION: '{{default "dev" .VERSION}}'
  RELEASE_VERSION: '{{default "" .RELEASE_VERSION}}'
  COVERAGE_MIN: '{{default "65.0" .COVERAGE_MIN}}'
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || printf unknown
  DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ

set:
  - errexit
  - nounset
  - pipefail

silent: false

tasks:
  default:
    desc: List available tasks.
    cmds:
      - task --list

  build:
    desc: Build the azkit binary into dist/.
    cmds:
      - mkdir -p dist
      - >-
        go build -trimpath
        -ldflags "-s -w -X github.com/LoriKarikari/azkit/internal/cli.version={{.VERSION}} -X github.com/LoriKarikari/azkit/internal/cli.commit={{.COMMIT}} -X github.com/LoriKarikari/azkit/internal/cli.date={{.DATE}}"
        -o dist/azkit ./cmd/azkit

  tidy:
    desc: Run go mod tidy.
    cmds:
      - go mod tidy

  tidy:check:
    desc: Verify go.mod and go.sum are tidy.
    cmds:
      - go mod tidy
      - git diff --exit-code -- go.mod go.sum

  test:
    desc: Run the unit test suite.
    cmds:
      - go test ./...

  test:race:
    desc: Run tests with race detection, shuffle, and coverage output.
    cmds:
      - go test -race -shuffle=on -coverprofile=coverage.out ./...

  test:integration:
    desc: Run binary integration tests.
    cmds:
      - go test -tags=integration -count=1 ./test/integration

  test:live:
    desc: Run live Azure PIM integration tests. Requires AZKIT_LIVE_TESTS=1 and Azure credentials.
    cmds:
      - go test -tags=integration -count=1 ./internal/azurepim

  coverage:summary:
    desc: Print coverage summary from coverage.out.
    cmds:
      - go tool cover -func=coverage.out

  coverage:check:
    desc: Verify total statement coverage meets COVERAGE_MIN.
    cmds:
      - |
        total="$(go tool cover -func=coverage.out | awk '/^total:/ { sub(/%$/, "", $3); print $3 }')"
        if [ -z "$total" ]; then
          echo "coverage total not found" >&2
          exit 1
        fi
        awk -v total="$total" -v min="{{.COVERAGE_MIN}}" 'BEGIN {
          if (total + 0 < min + 0) {
            printf "coverage %.1f%% is below %.1f%%\n", total, min
            exit 1
          }
          printf "coverage %.1f%% meets %.1f%% floor\n", total, min
        }'

  vet:
    desc: Run go vet.
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint.
    cmds:
      - go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}} run

  security:gosec:
    desc: Run gosec.
    cmds:
      - go run github.com/securego/gosec/v2/cmd/gosec@{{.GOSEC_VERSION}} ./...

  security:vuln:
    desc: Run govulncheck.
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@{{.GOVULNCHECK_VERSION}} ./...

  security:
    desc: Run security checks.
    cmds:
      - task: security:gosec
      - task: security:vuln

  install:check:
    desc: Check installer and shell script syntax/help output.
    cmds:
      - sh -n install.sh
      - for script in scripts/*.sh; do sh -n "$script"; done
      - |
        help_file="$(mktemp "${TMPDIR:-/tmp}/azkit-install-help.XXXXXX")"
        trap 'rm -f "$help_file"' EXIT
        sh install.sh --help > "$help_file"
        grep -q 'Install azkit' "$help_file"
        grep -q 'AZKIT_INSTALL_VERSION  Version to install, for example v0.4.0' "$help_file"
      - >-
        if command -v shellcheck >/dev/null 2>&1; then
          shellcheck install.sh scripts/*.sh;
        else
          echo "shellcheck not installed; skipping shellcheck";
        fi

  release:check:
    desc: Validate the GoReleaser config.
    cmds:
      - >-
        if command -v goreleaser >/dev/null 2>&1; then
          goreleaser check;
        else
          go run github.com/goreleaser/goreleaser/v2@{{.GORELEASER_VERSION}} check;
        fi

  release:smoke:
    desc: Install and smoke-test a published release. Set RELEASE_VERSION=vX.Y.Z.
    cmds:
      - ./scripts/smoke-release-install.sh '{{.RELEASE_VERSION}}'

  smoke:
    desc: Build and smoke-test the CLI command surface.
    cmds:
      - ./scripts/smoke-cli.sh '{{.VERSION}}'

  ci:
    desc: Run the main local CI suite.
    cmds:
      - task: tidy:check
      - task: install:check
      - task: test:race
      - task: coverage:check
      - task: test:integration
      - task: vet
      - task: lint
      - task: security
      - task: release:check
      - task: smoke
