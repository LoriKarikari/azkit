version: 2

builds:
  - main: ./cmd/pimctl
    binary: pimctl
    ldflags:
      - -s -w -X github.com/LoriKarikari/pimctl/internal/cli.version={{.Version}} -X github.com/LoriKarikari/pimctl/internal/cli.commit={{.Commit}} -X github.com/LoriKarikari/pimctl/internal/cli.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

archives:
  - formats: tar.gz
    wrap_in_directory: true
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  disable: true

release:
  prerelease: auto
