version: 2

project_name: azkit

builds:
  - main: ./cmd/azkit
    binary: azkit
    ldflags:
      - -s -w -X github.com/LoriKarikari/azkit/internal/cli.version={{.Version}} -X github.com/LoriKarikari/azkit/internal/cli.commit={{.Commit}} -X github.com/LoriKarikari/azkit/internal/cli.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

archives:
  - formats: tar.gz
    wrap_in_directory: true
    files:
      - LICENSE
      - README.md
      - install.sh

checksum:
  name_template: checksums.txt

changelog:
  disable: true

release:
  prerelease: auto
