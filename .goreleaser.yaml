version: 2

builds:
  - main: ./cmd/pimctl
    binary: pimctl
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

archives:
  - formats: tar.gz
    wrap_in_directory: true
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  use: github-native

release:
  prerelease: auto
