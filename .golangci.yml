version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bidichk
    - bodyclose
    - containedctx
    - copyloopvar
    - durationcheck
    - errcheck
    - errorlint
    - fatcontext
    - forcetypeassert
    - govet
    - ineffassign
    - modernize
    - nilerr
    - noctx
    - nolintlint
    - staticcheck
    - testifylint
    - thelper
    - unused
    - usetesting

  settings:
    nolintlint:
      require-explanation: true
      require-specific: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
