name: Setup Go and Task

description: Set up Go and install Task for project workflows.

inputs:
  task-version:
    description: Task version to install.
    required: false
    # renovate: datasource=github-releases depName=go-task/task
    default: 3.52.0

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Setup Task
      uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2
      with:
        version: ${{ inputs.task-version }}
