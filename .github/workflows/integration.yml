name: Integration Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * 1'

permissions:
  contents: read

jobs:
  azure-pim:
    name: Azure PIM live tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ vars.PIMCTL_LIVE_TESTS == '1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run live tests
        env:
          PIMCTL_LIVE_TESTS: ${{ vars.PIMCTL_LIVE_TESTS }}
          PIMCTL_LIVE_SUBSCRIPTION: ${{ secrets.PIMCTL_LIVE_SUBSCRIPTION }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: go test -tags=integration -count=1 ./internal/azurepim
