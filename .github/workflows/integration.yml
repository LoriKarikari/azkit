name: Integration Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * 1'

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  azure-pim:
    name: Azure PIM live tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ vars.AZKIT_LIVE_TESTS == '1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go and Task
        uses: ./.github/actions/setup-task

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZKIT_LIVE_SUBSCRIPTION }}

      - name: Run live tests
        env:
          AZKIT_LIVE_TESTS: ${{ vars.AZKIT_LIVE_TESTS }}
          AZKIT_LIVE_SUBSCRIPTION: ${{ secrets.AZKIT_LIVE_SUBSCRIPTION }}
        run: task test:live
