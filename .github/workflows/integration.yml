name: Integration Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * 1'

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  azure-pim:
    name: Azure PIM live tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ vars.AZKIT_LIVE_TESTS == '1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go and Task
        uses: ./.github/actions/setup-task

      - name: Run live tests
        env:
          AZKIT_LIVE_TESTS: ${{ vars.AZKIT_LIVE_TESTS }}
          AZKIT_LIVE_SUBSCRIPTION: ${{ secrets.AZKIT_LIVE_SUBSCRIPTION }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: task test:live
