name: release-please

on:
  push:
    branches: [main]

concurrency:
  group: release-please-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        if: ${{ steps.release.outputs.release_created == 'true' }}
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Setup Go and Task
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: ./.github/actions/setup-task

      - run: go mod download
        if: ${{ steps.release.outputs.release_created == 'true' }}

      - run: task test
        if: ${{ steps.release.outputs.release_created == 'true' }}

      - run: task vet
        if: ${{ steps.release.outputs.release_created == 'true' }}

      - name: Setup Syft
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.46.0

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        if: ${{ steps.release.outputs.release_created == 'true' }}
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release artifacts
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-checksums: dist/checksums.txt

      - name: Smoke test published release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: ./scripts/smoke-release-install.sh "${{ steps.release.outputs.tag_name }}"
