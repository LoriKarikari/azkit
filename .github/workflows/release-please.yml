name: release-please

on:
  push:
    branches: [main]

concurrency:
  group: release-please-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ steps.release.outputs.release_created == 'true' }}
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Setup Go and Task
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: ./.github/actions/setup-task

      - run: go mod download
        if: ${{ steps.release.outputs.release_created == 'true' }}

      - run: task test
        if: ${{ steps.release.outputs.release_created == 'true' }}

      - run: task vet
        if: ${{ steps.release.outputs.release_created == 'true' }}

      - name: Setup Syft
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          # renovate: datasource=github-releases depName=anchore/syft
          syft-version: v1.46.0

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        if: ${{ steps.release.outputs.release_created == 'true' }}
        with:
          distribution: goreleaser
          # renovate: datasource=github-releases depName=goreleaser/goreleaser
          version: v2.17.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release artifacts
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-checksums: dist/checksums.txt

      - name: Smoke test published release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: ./scripts/smoke-release-install.sh "${{ steps.release.outputs.tag_name }}"
