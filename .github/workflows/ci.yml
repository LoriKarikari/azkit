name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  hygiene:
    name: Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go and Task
        uses: ./.github/actions/setup-task

      - name: Download modules
        run: go mod download

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Check go.mod and installer
        run: |
          task tidy:check
          task install:check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go and Task
        uses: ./.github/actions/setup-task

      - name: Download modules
        run: go mod download

      - name: Test with race detector
        run: task test:race

      - name: Binary integration test
        run: task test:integration

      - name: Show coverage summary
        run: task coverage:summary

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  test-os:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go and Task
        uses: ./.github/actions/setup-task

      - name: Download modules
        run: go mod download

      - name: Unit tests
        run: task test

  vet:
    name: Vet
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go and Task
        uses: ./.github/actions/setup-task

      - name: Download modules
        run: go mod download

      - name: Vet
        run: task vet

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go and Task
        uses: ./.github/actions/setup-task

      - name: Download modules
        run: go mod download

      - name: Lint
        run: task lint

  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go and Task
        uses: ./.github/actions/setup-task

      - name: Download modules
        run: go mod download

      - name: Security checks
        run: task security

  release-check:
    name: Release check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go and Task
        uses: ./.github/actions/setup-task

      - name: Setup GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.17.0
          install-only: true

      - name: Check GoReleaser config
        run: task release:check

  smoke:
    name: CLI smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go and Task
        uses: ./.github/actions/setup-task

      - name: Smoke test CLI
        run: task smoke

  required:
    name: Test, vet, lint
    runs-on: ubuntu-latest
    needs:
      - hygiene
      - test
      - test-os
      - vet
      - lint
      - security
      - release-check
      - smoke
    if: ${{ always() }}
    steps:
      - name: Check split CI result
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ] || [ "${{ contains(needs.*.result, 'skipped') }}" = "true" ]; then
            exit 1
          fi
          echo "CI split jobs passed."
