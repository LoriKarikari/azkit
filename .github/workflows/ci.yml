name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  hygiene:
    name: Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go and Task
        uses: ./.github/actions/setup-task

      - name: Download modules
        run: go mod download

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Check go.mod and installer
        run: |
          task tidy:check
          task install:check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go and Task
        uses: ./.github/actions/setup-task

      - name: Download modules
        run: go mod download

      - name: Test with race detector
        run: task test:race

      - name: Binary integration test
        run: task test:integration

      - name: Show coverage summary
        run: task coverage:summary

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out

      - name: Check coverage floor
        run: task coverage:check

  test-os:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go and Task
        uses: ./.github/actions/setup-task

      - name: Download modules
        run: go mod download

      - name: Unit tests
        run: task test

  vet:
    name: Vet
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go and Task
        uses: ./.github/actions/setup-task

      - name: Download modules
        run: go mod download

      - name: Vet
        run: task vet

  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go and Task
        uses: ./.github/actions/setup-task

      - name: Download modules
        run: go mod download

      - name: Security checks
        run: task security

  release-check:
    name: Release check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Go and Task
        uses: ./.github/actions/setup-task

      - name: Setup GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          install-only: true

      - name: Check GoReleaser config
        run: task release:check

  smoke:
    name: CLI smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go and Task
        uses: ./.github/actions/setup-task

      - name: Smoke test CLI
        run: task smoke
